openapi: "3.0.3"
info:
  title: StudyRoom Reservation API
  version: "1.0.0"

paths:
  /login:
    post:
      operationId: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /reservations:
    post:
      operationId: CreateReservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "200":
          description: 예약 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"

  /reservations/{ReservationID}:
    get:
      operationId: GetReservation
      security:
        - bearerAuth: []
      parameters:
        - name: ReservationID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 예약 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReservationResponse"

  /reservations/{ReservationID}/cancel:
    put:
      operationId: CancelReservation
      security:
        - bearerAuth: []
      parameters:
        - name: ReservationID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 예약 취소 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelReservationResponse"

  /me/reservations:
    get:
      operationId: ListMyReservations
      security:
        - bearerAuth: []
      x-pagination:
        style: offset
        defaultLimit: 20
        maxLimit: 100
      x-sort:
        allowed: [StartAt, CreatedAt]
        default: StartAt
        direction: desc
      x-filter:
        allowed: [Status, RoomID]
      responses:
        "200":
          description: 내 예약 목록
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListReservationsResponse"

  /rooms/{RoomID}:
    put:
      operationId: UpdateRoom
      security:
        - bearerAuth: []
      parameters:
        - name: RoomID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoomRequest"
      responses:
        "200":
          description: 방 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomResponse"
    delete:
      operationId: DeleteRoom
      security:
        - bearerAuth: []
      parameters:
        - name: RoomID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 방 삭제 성공

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    LoginRequest:
      type: object
      required: [Email, Password]
      properties:
        Email:
          type: string
          format: email
        Password:
          type: string

    LoginResponse:
      type: object
      properties:
        token:
          $ref: "#/components/schemas/Token"

    Token:
      type: object
      properties:
        AccessToken:
          type: string
        ExpiresAt:
          type: string
          format: date-time

    CreateReservationRequest:
      type: object
      required: [RoomID, StartAt, EndAt]
      properties:
        RoomID:
          type: integer
          format: int64
        StartAt:
          type: string
          format: date-time
        EndAt:
          type: string
          format: date-time

    ReservationResponse:
      type: object
      properties:
        reservation:
          $ref: "#/components/schemas/Reservation"

    CancelReservationResponse:
      type: object
      properties:
        reservation:
          $ref: "#/components/schemas/Reservation"
        refund:
          $ref: "#/components/schemas/Refund"

    ListReservationsResponse:
      type: object
      properties:
        reservations:
          type: array
          items:
            $ref: "#/components/schemas/Reservation"
        total:
          type: integer

    Reservation:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        UserID:
          type: integer
          format: int64
        RoomID:
          type: integer
          format: int64
        StartAt:
          type: string
          format: date-time
        EndAt:
          type: string
          format: date-time
        Status:
          type: string

    Refund:
      type: object
      properties:
        Amount:
          type: integer
        Reason:
          type: string

    UpdateRoomRequest:
      type: object
      required: [Name, Capacity, Location]
      properties:
        Name:
          type: string
        Capacity:
          type: integer
        Location:
          type: string

    RoomResponse:
      type: object
      properties:
        room:
          $ref: "#/components/schemas/Room"

    Room:
      type: object
      properties:
        ID:
          type: integer
          format: int64
        Name:
          type: string
        Capacity:
          type: integer
        Location:
          type: string
